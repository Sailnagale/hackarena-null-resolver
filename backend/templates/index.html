<!DOCTYPE html>
<html>
<head>

<title>ThreatSense AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.video-box{
position:relative;
background:black;
aspect-ratio:16/9;
}

#drawCanvas{
position:absolute;
top:0;
left:0;
cursor:crosshair;
}

</style>

</head>

<body class="bg-slate-950 text-white">

<nav class="bg-slate-900 p-4 flex justify-between">

<div class="font-bold text-cyan-400">
ThreatSense AI
</div>

<div class="space-x-4">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>

</nav>

<div class="p-6 grid grid-cols-3 gap-6">

<div class="col-span-2">

<div class="video-box rounded-xl border border-slate-700 overflow-hidden">

<video id="videoPreview" class="hidden w-full"></video>
<img id="videoFeed" class="hidden w-full">

<canvas id="drawCanvas"></canvas>

</div>

<div class="flex gap-3 mt-4 flex-wrap">

<input type="file" id="videoInput">

<select id="featureSelect" class="bg-black p-2 rounded">

<option value="master">Master</option>
<option value="tripwire">Tripwire</option>

</select>

<select id="colorInput" class="bg-black p-2 rounded">

<option value="red">Red</option>
<option value="blue">Blue</option>
<option value="green">Green</option>

</select>

<button id="startBtn" class="bg-green-600 px-4 py-2 rounded">
Start
</button>

<button id="stopBtn" class="bg-red-600 px-4 py-2 rounded">
Stop
</button>

<button id="restartBtn" class="bg-yellow-600 px-4 py-2 rounded">
Restart
</button>

</div>

</div>

<div class="bg-slate-900 rounded-xl border border-slate-700 p-4">

<h2 class="font-bold mb-3">Detection Log</h2>

<div id="eventLog" class="text-sm"></div>

</div>

</div>

<script src="/static/js/app.js"></script>

</body>
</html>
