<!DOCTYPE html>
<html>
<head>

<title>ThreatSense AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.video-box{
position:relative;
background:black;
width:100%;
aspect-ratio:16/9;
}
canvas{
position:absolute;
top:0;
left:0;
z-index:10;
cursor:crosshair;
}
</style>

</head>

<body class="bg-slate-950 text-white p-6">

<div class="max-w-6xl mx-auto grid grid-cols-3 gap-6">

<div class="col-span-2">

<div class="video-box rounded-xl overflow-hidden border border-slate-800">

<video id="videoPreview" class="w-full h-full hidden" muted></video>

<img id="videoFeed" class="w-full h-full hidden">

<canvas id="drawCanvas"></canvas>

</div>

<div class="flex gap-3 mt-4">

<input type="file" id="videoInput" hidden>

<button onclick="videoInput.click()" class="bg-slate-800 px-4 py-2 rounded">
Upload
</button>

<select id="featureSelect" class="bg-slate-800 px-3 py-2 rounded">

<option value="master">Master</option>

<option value="tripwire">Tripwire</option>

</select>

<input id="colorInput" placeholder="red"
class="bg-black px-3 py-2 rounded border border-slate-700 w-24">

<button id="btnStart"
class="bg-cyan-600 px-4 py-2 rounded">
Start Monitoring
</button>

</div>

</div>

<div class="bg-slate-900 rounded-xl p-4 border border-slate-800">

<h2 class="font-bold mb-3">Detection Log</h2>

<div id="eventLog" class="text-xs"></div>

</div>

</div>

<script src="/static/js/app.js"></script>

</body>
</html>
